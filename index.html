<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汉字笔画拆分工具</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>汉字笔画拆分工具</h1>
      <p class="subtitle">输入汉字，查看笔画数和笔顺动画</p>
    </header>

    <main class="card">
      <div class="input-row">
        <input
          type="text"
          id="char-input"
          class="char-input"
          placeholder="请输入一个汉字"
          maxlength="1"
          autocomplete="off"
        >
        <button id="analyze-btn" class="btn btn-primary">分析笔画</button>
        <button id="clear-btn" class="btn btn-secondary">清空</button>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>
      <div id="loading" class="loading hidden">加载中…</div>

      <section id="result" class="result hidden">
        <div class="char-summary">
          <div id="main-char" class="main-char"></div>
          <div class="stats">
            <div class="stat-card">
              <span class="stat-label">总笔画数</span>
              <span id="stroke-count" class="stat-value">0</span>
            </div>
            <div class="stat-card">
              <span class="stat-label">拼音</span>
              <span id="pinyin" class="stat-value">—</span>
            </div>
          </div>
          <button id="animate-btn" class="btn btn-outline">播放笔顺动画</button>
        </div>

        <div class="strokes-header">
          <h2>笔画拆分</h2>
          <button id="export-all-btn" class="btn btn-outline btn-sm">导出全部笔画</button>
        </div>
        <div id="strokes-grid" class="strokes-grid"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

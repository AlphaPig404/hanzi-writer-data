<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>汉字笔画拆分工具</title>
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>汉字笔画拆分工具</h1>
      <p class="subtitle">输入汉字查看笔画拆分，或输入关卡号查看关卡配置</p>
    </header>

    <main class="card">
      <div class="input-row">
        <textarea
          id="char-input"
          class="char-input"
          rows="1"
          placeholder="请输入汉字或关卡号"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <button id="analyze-btn" class="btn btn-primary">查询</button>
        <button id="clear-btn" class="btn btn-secondary">清空</button>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>
      <div id="loading" class="loading hidden">加载中…</div>

      <section id="result" class="result hidden">
        <div class="char-summary">
          <div id="main-char" class="main-char"></div>
          <div class="stats">
            <div class="stat-card">
              <span class="stat-label">总笔画数</span>
              <span id="stroke-count" class="stat-value">0</span>
            </div>
            <div class="stat-card">
              <span class="stat-label">拼音</span>
              <span id="pinyin" class="stat-value">—</span>
            </div>
          </div>
          <div class="char-actions">
            <button id="animate-btn" class="btn btn-outline">播放笔顺动画</button>
            <button id="export-char-btn" class="btn btn-outline">导出整字</button>
          </div>
        </div>

        <div class="strokes-header">
          <h2>笔画拆分</h2>
          <button id="export-all-btn" class="btn btn-outline btn-sm">导出全部笔画</button>
        </div>
        <div id="strokes-grid" class="strokes-grid"></div>
      </section>

      <section id="level-result" class="level-result hidden">
        <div class="level-result-header">
          <h2 id="level-title">关卡配置</h2>
          <button id="copy-level-btn" class="btn btn-outline btn-sm">复制 JSON</button>
        </div>
        <pre id="level-json" class="level-json"></pre>
      </section>
    </main>
  </div>

  <script src="js/app.js?v=11"></script>
</body>
</html>
